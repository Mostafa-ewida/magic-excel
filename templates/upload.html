<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام معالجة الملفات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --accent-color: #3b82f6;
            --background-color: #f1f5f9;
            --card-background: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }

        body {
            background-color: var(--background-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .main-title {
            color: var(--primary-color);
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
            padding-bottom: 1rem;
        }

        .main-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            border-radius: 2px;
        }

        .card {
            background: var(--card-background);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            border: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 20px 20px 0 0 !important;
            padding: 1.5rem;
            border: none;
        }

        .card-body {
            padding: 2rem;
        }

        .form-label {
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .form-control {
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .icon-large {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content {
            border-radius: 20px;
            border: none;
        }

        .modal-body {
            padding: 2rem;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            color: var(--primary-color);
        }

        .form-control[type="file"] {
            padding: 1rem;
            background-color: #f8fafc;
            cursor: pointer;
        }

        .form-control[type="file"]:hover {
            background-color: #f1f5f9;
        }

        @media (max-width: 768px) {
            .page-container {
                padding: 1rem;
            }

            .main-title {
                font-size: 2rem;
            }

            .card-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <h1 class="main-title">نظام معالجة الملفات المتكامل</h1>
        
        <div class="row g-4">
            <div class="col-lg-4 col-md-6">
                <div class="card h-100">
                    <div class="card-header text-center">
                        <i class="bi bi-file-earmark-word icon-large"></i>
                        <h3 class="mb-0">تحويل Word إلى Excel</h3>
                    </div>
                    <div class="card-body">
                        <form action="/convert" method="post" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label class="form-label">اختر ملف Word:</label>
                                <input type="file" class="form-control" name="word_file" accept=".docx" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-arrow-right-circle me-2"></i>تحويل
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="card h-100">
                    <div class="card-header text-center">
                        <i class="bi bi-file-earmark-excel icon-large"></i>
                        <h3 class="mb-0">دمج ملفات Excel</h3>
                    </div>
                    <div class="card-body">
                        <form action="/concatenate" method="post" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label class="form-label">اختر ملفات Excel:</label>
                                <input type="file" class="form-control" name="excel_files" multiple accept=".xlsx" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-union me-2"></i>دمج الملفات
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="card h-100">
                    <div class="card-header text-center">
                        <i class="bi bi-search icon-large"></i>
                        <h3 class="mb-0">البحث في Excel</h3>
                    </div>
                    <div class="card-body">
                        <form action="/search" method="post" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label class="form-label">اختر ملف Excel:</label>
                                <input type="file" class="form-control" name="search_excel_file" accept=".xlsx" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">كلمة البحث:</label>
                                <input type="text" class="form-control" name="search_keyword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search me-2"></i>بحث
                            </button>
                        </form>
                    </div>
                </div>
            </div>
             <!-- ✅ NEW: Excel to Word -->
    <div class="col-lg-4 col-md-6">
        <div class="card h-100">
            <div class="card-header text-center">
                <i class="bi bi-file-earmark-arrow-up icon-large"></i>
                <h3 class="mb-0">تحويل Excel إلى Word</h3>
            </div>
            <div class="card-body">
                <form action="/excel-to-word" method="post" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label">اختر ملف Excel:</label>
                        <input type="file" class="form-control" name="excel_file" accept=".xlsx" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-arrow-right-circle me-2"></i>تحويل
                    </button>
                </form>
            </div>
        </div>
            </div>
        </div>

        <div class="modal fade" id="progressModal" tabindex="-1" data-bs-backdrop="static">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-body text-center">
                        <div class="spinner-border mb-4" role="status" id="loadingSpinner"></div>
                        <div id="completionMessage" style="display: none;">
                            <i class="bi bi-check-circle" style="font-size: 3rem; color: #28a745;"></i>
                            <h5 class="mb-3">تمت المعالجة بنجاح!</h5>
                            <p class="text-muted mb-0">تم اكتمال العملية. يمكنك الآن تحميل الملف.</p>
                        </div>
                        <h5 id="processingMessage" class="mb-3">جاري معالجة الملف...</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', (e) => {
                const fileInput = form.querySelector('input[type="file"]');
                if (fileInput && fileInput.files.length > 0) {
                    const modal = new bootstrap.Modal(document.getElementById('progressModal'));
                    modal.show();

                    setTimeout(() => {
                        document.getElementById('loadingSpinner').style.display = 'none';
                        document.getElementById('processingMessage').style.display = 'none';
                        document.getElementById('completionMessage').style.display = 'block';

                        setTimeout(() => {
                            modal.hide();
                        }, 3000);
                    }, 5000);
                } else {
                    e.preventDefault();
                    alert('الرجاء اختيار ملف أولاً');
                }
            });
        });
    </script>
</body>
</html>
